name: Backend CI

# Triggers: push/PR to main or develop, scoped to backend files
on:
  push:
    branches: ["main", "develop"]
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2 – Unit Tests (matrix: Node 18 & 20)
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ["18.x", "20.x"]
      fail-fast: false

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Jest unit tests – handler called directly with mock req/res, no HTTP
      - name: Run unit tests with coverage
        run: npm run test:unit
        env:
          NODE_ENV: test

      - name: Upload unit coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-coverage
          path: server/coverage/unit/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3 – Integration Tests (Supertest, no real port)
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ["18.x", "20.x"]
      fail-fast: false

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Supertest – full middleware stack, no TCP port
      - name: Run integration tests with coverage
        run: npm run test:integration
        env:
          NODE_ENV: test

      - name: Upload integration coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-coverage
          path: server/coverage/integration/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 4 – E2E Tests (real TCP server on port 5099)
  # ─────────────────────────────────────────────
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Spins up a real HTTP server, makes real TCP calls, then tears it down
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          PORT: 5001

  # ─────────────────────────────────────────────
  # JOB 5 – Swagger / OpenAPI Validation
  # ─────────────────────────────────────────────
  swagger-validate:
    name: Swagger / OpenAPI Validation
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Generate openapi.json from JSDoc annotations (no server needed)
      - name: Generate OpenAPI spec
        run: npm run swagger-gen
        env:
          NODE_ENV: test

      # Strict spec validation via swagger-cli
      - name: Validate OpenAPI spec
        run: npx @apidevtools/swagger-cli validate openapi.json

      - name: Upload OpenAPI spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: server/openapi.json
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 6 – Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Fail on high/critical vulnerabilities; moderate are informational
      - name: npm audit
        run: npm audit --audit-level=high

      - name: Check outdated packages
        run: npm outdated || true

  # ─────────────────────────────────────────────
  # JOB 7 – Build & Archive (runs after all tests pass)
  # ─────────────────────────────────────────────
  build:
    name: Build & Archive
    runs-on: ubuntu-latest
    needs: [e2e-test, swagger-validate, security-audit]

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      # Production install – no dev dependencies in the archive
      - name: Install production dependencies
        run: npm ci --omit=dev

      # Start the server, wait, hit health endpoint, then stop
      - name: Smoke test – health endpoint
        run: |
          node src/index.js &
          SERVER_PID=$!
          sleep 3
          curl -f http://localhost:5001/api/health || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID
        env:
          PORT: 5001
          NODE_ENV: production

      - name: Create deployment archive
        run: |
          tar -czf shopsmart-backend.tar.gz \
            src/ \
            package.json \
            package-lock.json \
            openapi.json || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopsmart-backend-build
          path: server/shopsmart-backend.tar.gz
          retention-days: 7
