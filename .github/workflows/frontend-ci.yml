name: Frontend CI

# Triggers: push/PR to main or develop, scoped to frontend files
on:
  push:
    branches: ["main", "develop"]
    paths:
      - "client/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "client/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Lint
  # ─────────────────────────────────────────────
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2 – Unit Tests (Vitest, matrix: Node 18 & 20)
  # Tests individual components with mocked fetch
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ["18.x", "20.x"]
      fail-fast: false

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vitest unit tests – no network, fetch mocked inside test files
      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          VITE_API_URL: ""

      - name: Upload unit coverage
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-coverage
          path: client/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3 – Integration Tests (Vitest, async state flow)
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ["18.x", "20.x"]
      fail-fast: false

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vitest integration tests – validates async state transitions (waitFor)
      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          VITE_API_URL: ""

  # ─────────────────────────────────────────────
  # JOB 4 – Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Check outdated packages
        run: npm outdated || true

  # ─────────────────────────────────────────────
  # JOB 5 – Production Build
  # ─────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, security-audit]

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite production)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}

      # Verify the dist/ folder was created and contains index.html
      - name: Verify build output
        run: |
          test -f dist/index.html && \
            echo "Build OK: index.html found" || \
            (echo "Build FAILED: no index.html" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopsmart-frontend-dist
          path: client/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 6 – E2E Tests (Playwright, Chromium + Firefox)
  # Requires a successful build first; API is mocked via page.route()
  # ─────────────────────────────────────────────
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Re-build the app so the preview server has something to serve
      - name: Build for E2E
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ""

      # Install only the browsers we test on (Chromium + Firefox)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # Playwright starts Vite preview automatically (playwright.config.js webServer)
      # fetch calls are intercepted via page.route() – no real backend needed
      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7

      - name: Upload Playwright screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: client/test-results/
          retention-days: 3
